spring.application.name=taskmanager

# =====================
#      SERVER
# =====================
server.port=8080

# =====================
#      DATABASE (MySQL)
# =====================
spring.datasource.url=jdbc:mysql://localhost:3306/taskdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=chakraborty@123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =====================
#      JPA / HIBERNATE
# =====================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


# =====================
#      JWT CONFIG
# =====================
jwt.secret=mysecretkeymysecretkeymysecretkey
jwt.expiration=86400000   # 24 hours in milliseconds

# =====================
#      SWAGGER / OPENAPI
# =====================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui/index.html

# =====================
#      LOGGING
# =====================
logging.level.org.springframework=INFO
logging.level.com.assignment.taskmanager=DEBUG
